version: '3.8'

services:
  # ===========================================
  # NGINX REVERSE PROXY
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: loc_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - portal
      - file-upload
      - csrf-bank
      - csrf-evil
      - ssrf-lab
      - xss-lab
    networks:
      - loc_network
    restart: unless-stopped

  # ===========================================
  # MAIN PORTAL (PHP + Apache)
  # SQL Injection + JWT Labs
  # ===========================================
  portal:
    build: ./portal
    container_name: loc_portal
    volumes:
      - ./portal/www:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=leaguesofcode_db
      - DB_USER=locadmin
      - DB_PASS=locpass123
      - JWT_SECRET=secret123
    networks:
      - loc_network
    restart: unless-stopped

  # ===========================================
  # FILE UPLOAD LAB (hackday-afu)
  # Path: /profile/
  # ===========================================
  file-upload:
    build: ./labs/hackday-afu
    container_name: loc_file_upload
    volumes:
      - ./labs/hackday-afu/uploads:/app/uploads
    networks:
      - loc_network
    restart: unless-stopped

  # ===========================================
  # CSRF LAB - Bank Application
  # Path: /share/
  # ===========================================
  csrf-bank:
    build: ./labs/csrf-lab/bank
    container_name: loc_csrf_bank
    networks:
      - loc_network
    restart: unless-stopped

  # ===========================================
  # CSRF LAB - Evil/Attacker Site
  # Path: /evil/
  # ===========================================
  csrf-evil:
    build: ./labs/csrf-lab/evil
    container_name: loc_csrf_evil
    networks:
      - loc_network
    restart: unless-stopped

  # ===========================================
  # SSRF LAB (Python Flask)
  # Path: /api/
  # ===========================================
  ssrf-lab:
    build: ./labs/ssrf-lab
    container_name: loc_ssrf_lab
    networks:
      - loc_network
    restart: unless-stopped

  # ===========================================
  # XSS LAB (Node.js)
  # Path: /search/
  # ===========================================
  xss-lab:
    build: ./labs/xss_lab3
    container_name: loc_xss_lab
    networks:
      - loc_network
    restart: unless-stopped

  # ===========================================
  # MySQL DATABASE
  # ===========================================
  db:
    image: mysql:8.0
    container_name: loc_db
    environment:
      - MYSQL_DATABASE=leaguesofcode_db
      - MYSQL_USER=locadmin
      - MYSQL_PASSWORD=locpass123
      - MYSQL_ROOT_PASSWORD=rootpass123
    volumes:
      - ./portal/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - loc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # SSH KEY AUTHENTICATION LAB
  # Port: 2222
  # Pre-lab for practicing SSH key auth attacks
  # ===========================================
  ssh-lab:
    build: ./labs/ssh-lab
    container_name: loc_ssh_lab
    ports:
      - "2222:22"
    networks:
      - ssh_network
    restart: unless-stopped

networks:
  loc_network:
    driver: bridge
  ssh_network:
    driver: bridge

volumes:
  mysql_data:

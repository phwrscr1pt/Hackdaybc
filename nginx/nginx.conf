worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Timeouts
    sendfile on;
    keepalive_timeout 65;

    # Upstream servers
    upstream portal {
        server portal:80;
    }

    upstream file_upload {
        server file-upload:80;
    }

    upstream csrf_bank {
        server csrf-bank:5000;
    }

    upstream csrf_evil {
        server csrf-evil:9999;
    }

    upstream ssrf_lab {
        server ssrf-lab:7070;
    }

    upstream xss_lab {
        server xss-lab:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Add headers for Wappalyzer detection
        add_header X-Powered-By "PHP/8.2";
        add_header X-Server "Apache/2.4";

        # ===========================================
        # BACKWARD COMPATIBILITY REDIRECTS
        # Old paths redirect to new business-like paths
        # ===========================================
        
        # Old /sqli/ paths -> /resources/
        location = /sqli/ { return 301 /resources/; }
        location = /sqli/index.php { return 301 /resources/; }
        location = /sqli/lab0_login.php { return 301 /resources/login.php; }
        location = /sqli/lab1_register.php { return 301 /resources/register.php; }
        location = /sqli/lab2_members.php { return 301 /resources/directory.php; }
        location = /sqli/lab3_inventory.php { return 301 /resources/catalog.php; }
        location = /sqli/lab4_partner.php { return 301 /resources/verify.php; }
        location = /sqli/lab5_library.php { return 301 /resources/books.php; }
        location = /sqli/lab5_request.php { return 301 /resources/request.php; }
        
        # Old /jwt/ paths -> /account/
        location = /jwt/ { return 301 /account/; }
        location = /jwt/index.php { return 301 /account/; }
        location = /jwt/login.php { return 301 /account/signin.php; }
        location = /jwt/dashboard.php { return 301 /account/portal.php; }
        location = /jwt/login_secure.php { return 301 /account/secure.php; }
        location = /jwt/dashboard_secure.php { return 301 /account/admin.php; }
        location = /jwt/refresh.php { return 301 /account/refresh.php; }
        location = /jwt/api.php { return 301 /account/api.php; }

        # ===========================================
        # MAIN PORTAL (/, /members/, /resources/, /account/)
        # ===========================================
        location / {
            proxy_pass http://portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===========================================
        # FILE UPLOAD (/profile/)
        # ===========================================
        location /profile/ {
            rewrite ^/profile/(.*)$ /$1 break;
            proxy_pass http://file_upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===========================================
        # CREDIT SYSTEM (/share/)
        # ===========================================
        location /share/ {
            rewrite ^/share/(.*)$ /$1 break;
            proxy_pass http://csrf_bank;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===========================================
        # PARTNER PORTAL (/evil/)
        # ===========================================
        location /evil/ {
            rewrite ^/evil/(.*)$ /$1 break;
            proxy_pass http://csrf_evil;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===========================================
        # DEVELOPER API (/api/)
        # ===========================================
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://ssrf_lab;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===========================================
        # TECH BLOG (/search/)
        # ===========================================
        location /search/ {
            rewrite ^/search/(.*)$ /$1 break;
            proxy_pass http://xss_lab;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
